<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#007BFF" />
    <title>Nenemarket</title>

    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; overflow: hidden; background: #007BFF; }

      .splash {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background: #007BFF;
        gap: 24px;
        /* safe area padding for iPhone notch */
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
      }

      .splash-logo {
        width: 180px;
        height: auto;
      }

      .splash-spinner {
        width: 36px;
        height: 36px;
        border: 3px solid rgba(255,255,255,0.35);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin-top: 8px;
      }

      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <!--
      This splash is shown for ~1 second while Capacitor boots.
      Once running natively, server.url in capacitor.config.ts loads
      https://nenemarket.ng directly inside the WebView.
    -->
    <div class="splash">
      <img
        class="splash-logo"
        src="favicon.png"
        alt="Nenemarket"
      />
      <div class="splash-spinner"></div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
